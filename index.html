<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="index.css" />
    <title>Expanse Traker</title>
  </head>
  <body>
    <div class="main">
      <div class="cards">
        <div class="leftBudget">
          <p>Budget Left</p>
          <h1 class="leftBudgetAmount"></h1>
        </div>
        <div class="TotalBudget">
          <p>Total Budget</p>
          <h1 class="totalBudgetAmount"></h1>
        </div>
        <div class="totalExpense">
          <p>Total Expenses</p>
          <h1 class="totalExpenseAmount"></h1>
        </div>
      </div>
      <div class="history">
        <h1>History</h1>
        <div class="histContent">
        </div>
      </div>
    </div>
    <button>

    </button>
    <div class="container">
      <div class="expenses">
            <div class="header">
                <div class="tab active">Add Expense</div>
            </div>
            <div class="form-section">
                <label for="amount">Amount</label>
                <input type="text" id="amount" class="expenseAmount">
                <label for="category">Category</label>
                <input type="text" id="category" class="expenseAmount">
            </div>
            <div class="buttons-row">
                <button class="btn addExpense">Add +</button>
                <button class="btn Expenseclear">Clear</button>
            </div>
      </div>
      <div class="budget">
            <div class="header">
                <div class="tab active">Add Budget</div>
            </div>
            
            <div class="form-section">
                <label for="amount">Amount</label>
                <input type="text" id="amount" class="budgetAmount" placeholder="">
            </div>
            <div class="buttons-row">
                <button class="btn AddBudget">Add +</button>
                <button class="btn Budgetclear">Clear</button>
            </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
